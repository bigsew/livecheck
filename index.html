<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Instagram Creator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
background:#f8f9fa;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
font-family:Arial;
}

.card{
width:350px;
text-align:center;
}

</style>

<script>

function openInstagram(){

window.location.href="https://www.instagram.com/accounts/emailsignup/";

}

window.onload=function(){

// auto open instagram when webapp loads
setTimeout(openInstagram,1000)

}

</script>

</head>

<body>

<div class="card shadow p-4">

<h4 class="mb-3">Instagram Account Creator</h4>

<p class="text-muted">
Opening Instagram signup page...
</p>

<button onclick="openInstagram()" class="btn btn-primary w-100">
Open Instagram
</button>

</div>

</body>
</html>
