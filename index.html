<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instagram Signup · Telegram</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* fullscreen, no decorations, just the iframe */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #ffffff;
        }

        /* the iframe fills everything — no UI, no buttons, pure Instagram */
        .instant-frame {
            display: block;
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        /* optional tiny loader (barely visible) */
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            color: #0095f6;
            opacity: 0.7;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .loaded .loader {
            opacity: 0;
        }
    </style>
</head>
<body id="appBody">
    <!-- minimal loader, disappears once iframe starts loading -->
    <div class="loader">loading Instagram...</div>

    <!-- the one and only: Instagram email signup (mobile friendly) -->
    <iframe 
        id="igSignupFrame"
        class="instant-frame"
        src="https://www.instagram.com/accounts/emailsignup/?next=&hl=en"
        sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-downloads allow-storage-access-by-user-activation allow-top-navigation"
        allow="camera; microphone; clipboard-read; clipboard-write; geolocation; fullscreen"
        loading="eager"
    >
    </iframe>

    <script>
        (function() {
            // ---- Telegram mini app setup ----
            const tg = window.Telegram.WebApp;
            tg.expand();          // use full height
            tg.ready();           // tell Telegram we're ready

            // optional: make background / header match Instagram white
            if (tg.setHeaderColor) tg.setHeaderColor('#ffffff');
            if (tg.setBackgroundColor) tg.setBackgroundColor('#ffffff');

            // ---- get elements ----
            const iframe = document.getElementById('igSignupFrame');
            const bodyEl = document.getElementById('appBody');

            // ---- iframe load: hide the tiny loader ----
            iframe.addEventListener('load', function() {
                bodyEl.classList.add('loaded');
                console.log('✅ Instagram signup loaded inside WebApp');
            });

            // ---- iframe error fallback (rare) ----
            iframe.addEventListener('error', function() {
                console.warn('iframe error — maybe retry?');
                // optional simple retry after 2 seconds
                setTimeout(() => {
                    iframe.src = iframe.src; // reload
                }, 2000);
            });

            // ---- ensure the iframe always tries to load even if something glitches ----
            // (already has src set)

            // ---- (optional) force iframe to reload if it gets stuck ----
            // not needed, but we add a hidden safety: after 8 seconds, if still not loaded, reload once.
            let loadAttempts = 0;
            const maxAttempts = 1;
            const checkLoaded = setInterval(() => {
                if (loadAttempts >= maxAttempts) {
                    clearInterval(checkLoaded);
                    return;
                }
                // try to detect if iframe actually loaded something (rough check)
                try {
                    // if we can access contentWindow, it's same origin? no, but we just check if body is loaded
                    if (iframe.contentWindow) {
                        // seems alive, but we don't know. We'll just trust the load event.
                    }
                } catch (e) {
                    // cross-origin, but that's fine. we just reload once if load event never fired.
                    if (!bodyEl.classList.contains('loaded')) {
                        console.log('⚠️ forcing reload');
                        iframe.src = iframe.src;
                        loadAttempts++;
                    }
                }
            }, 4000);
        })();
    </script>
</body>
</html>
