<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IG Creator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Forces the mobile look on all devices */
        .mobile-view {
            width: 100%;
            height: 100%;
            max-width: 450px; /* Limits width on PC to stay in phone style */
            background: #fff;
            display: flex;
            flex-direction: column;
        }

        iframe {
            flex-grow: 1;
            width: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="mobile-view">
        <iframe 
            src="https://www.instagram.com/accounts/emailsignup/?next=&hl=en" 
            allow="camera; microphone; clipboard-read; clipboard-write;">
        </iframe>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
    </script>
</body>
</html>
