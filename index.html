<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multi Instagram Creator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Reset and Full Screen Setup */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow-x: hidden; /* Prevents side-scrolling */
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #222);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Flexible Container for PC and Mobile */
        .app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            max-width: 100%; /* Makes it flexible */
        }

        /* Responsive Iframe */
        iframe {
            flex-grow: 1; /* Takes up all available space */
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Optional: Bottom Navigation or Header */
        .controls {
            padding: 10px;
            background: var(--tg-theme-secondary-bg-color, #f4f4f4);
            text-align: center;
            border-top: 1px solid #ccc;
        }

        button {
            padding: 8px 16px;
            background: #0088cc;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <iframe 
            id="igFrame"
            src="https://www.instagram.com/accounts/emailsignup/?next=&hl=en" 
            allow="camera; microphone; clipboard-read; clipboard-write;">
        </iframe>
        
        <div class="controls">
            <button onclick="reloadFrame()">Refresh Page</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        // 1. Tell Telegram to use the full available height
        tg.expand();
        tg.ready();

        // 2. Refresh logic to clear state
        function reloadFrame() {
            document.getElementById('igFrame').src = document.getElementById('igFrame').src;
        }

        // 3. Set colors based on Telegram Theme
        document.body.style.setProperty('--tg-theme-bg-color', tg.backgroundColor);
    </script>
</body>
</html>
