<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Signup</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #fafafa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            color: #262626;
        }
        .container {
            max-width: 300px;
            padding: 20px;
        }
        .instagram-logo {
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #f09433, #d62976, #962fbf, #4f5bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }
        h3 {
            margin-bottom: 24px;
            font-weight: 400;
        }
        .button {
            background: #0095f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
            transition: background 0.2s;
        }
        .button:hover {
            background: #0081d6;
        }
        .note {
            font-size: 14px;
            color: #8e8e8e;
            margin-top: 16px;
        }
        .error-detail {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="instagram-logo">📸</div>
        <h3>Create Instagram Account</h3>
        
        <button class="button" id="openInstagramBtn">
            Open Instagram Signup
        </button>
        
        <button class="button" id="openInBrowserBtn" style="background: #32a852;">
            Open in Browser
        </button>
        
        <div class="error-detail" id="errorInfo">
            ⚠️ Instagram doesn't allow embedding in Telegram Web App.<br>
            <strong>Solution:</strong> Click the button above to open in external browser.
        </div>
        
        <div class="note">
            You'll be redirected to Instagram's official signup page
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const instagramUrl = 'https://www.instagram.com/accounts/emailsignup/?next=&hl=en';
        
        // Method 1: Open with Telegram's openLink (opens in external browser)
        document.getElementById('openInstagramBtn').addEventListener('click', function() {
            try {
                tg.openLink(instagramUrl, {
                    try_instant_view: false
                });
            } catch (e) {
                console.error('Telegram openLink failed:', e);
                // Fallback
                window.location.href = instagramUrl;
            }
        });
        
        // Method 2: Alternative direct browser open
        document.getElementById('openInBrowserBtn').addEventListener('click', function() {
            window.open(instagramUrl, '_blank');
        });

        // Auto-open after 1 second (optional - remove if you want user to click)
        setTimeout(() => {
            // Uncomment the next line if you want auto-redirect
            // tg.openLink(instagramUrl, { try_instant_view: false });
        }, 1000);
    </script>
</body>
</html>
