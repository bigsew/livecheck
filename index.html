<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Instagram Account Creator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#fafafa;
font-family: Arial;
}

.card{
max-width:400px;
margin:auto;
margin-top:80px;
border:1px solid #ddd;
}

.logo{
font-size:35px;
font-weight:bold;
text-align:center;
margin-bottom:20px;
}

.btn-instagram{
background:#3897f0;
color:white;
font-weight:bold;
}

</style>

</head>
<body>

<div class="card p-4 shadow-sm">

<div class="logo">
Instagram
</div>

<form action="https://www.instagram.com/accounts/emailsignup/" method="GET">

<div class="mb-3">
<input type="text" class="form-control" placeholder="Full Name" required>
</div>

<div class="mb-3">
<input type="text" class="form-control" placeholder="Username" required>
</div>

<div class="mb-3">
<input type="email" class="form-control" placeholder="Email Address" required>
</div>

<div class="mb-3">
<input type="password" class="form-control" placeholder="Password" required>
</div>

<button class="btn btn-instagram w-100">
Create Instagram Account
</button>

</form>

<div class="text-center mt-3">
<small>After clicking, you continue on Instagram.</small>
</div>

</div>

</body>
</html>
