<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ IG Horizon — Telegram WebApp</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Font Awesome 6 (free icons for beauty) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* RESET & GLOBAL — perfect phone canvas */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            background: radial-gradient(circle at 20% 30%, #1a1a2e, #16213e); /* deep cosmic gradient */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 0;
            margin: 0;
        }

        /* --- THE PHONE MOCKUP (GLASSMORPHIC DREAM) --- */
        .phone-mockup {
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(255, 255, 255, 0.05) inset;
            transition: all 0.2s ease;
        }

        /* desktop / large screen constraints — premium device frame */
        @media (min-width: 600px) {
            .phone-mockup {
                width: 390px;
                height: 812px;  /* elegant iPhone 12/13 proportions */
                border-radius: 48px;
                border: 8px solid rgba(220, 220, 230, 0.25);
                backdrop-filter: blur(2px);
                box-shadow: 
                    0 40px 80px -10px rgba(0, 0, 0, 0.9),
                    0 0 0 3px rgba(255, 255, 255, 0.1) inset,
                    0 0 20px rgba(0, 149, 246, 0.3);
                overflow: hidden;
            }
        }

        /* DYNAMIC DYNAMIC ISLAND / NOTCH (whimsical) */
        .dynamic-island {
            background: #0d0d0f;
            height: 34px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            color: #f5f5f7;
            font-size: 15px;
            font-weight: 500;
            backdrop-filter: blur(8px);
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .time {
            font-weight: 600;
            letter-spacing: 0.5px;
            background: rgba(255,255,255,0.15);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 13px;
            backdrop-filter: blur(4px);
        }

        .notch-icons i {
            margin-left: 8px;
            color: #ffdd55;
            text-shadow: 0 0 6px gold;
        }

        /* --- IFRAME (INSTAGRAM NATIVE VIBE) --- */
        .story-iframe {
            flex: 1;
            width: 100%;
            background: #ffffff;
            border: none;
            border-radius: 0;
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
        }

        /* --- BOTTOM DOCK — next-level navigation --- */
        .nav-dock {
            background: rgba(18, 18, 28, 0.85);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            height: 76px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 6px 16px;
            color: #fff;
            box-shadow: 0 -8px 25px rgba(0, 0, 0, 0.5);
        }

        .dock-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1);
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 40px;
            background: transparent;
            border: none;
        }

        .dock-item i {
            font-size: 24px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .dock-item.active {
            color: #0095f6;
            background: rgba(0, 149, 246, 0.15);
            backdrop-filter: blur(5px);
        }

        .dock-item.active i {
            color: #0095f6;
            transform: translateY(-2px);
        }

        .dock-item span {
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* the iconic plus / create button */
        .create-button {
            background: linear-gradient(145deg, #0095f6, #b307d6);
            width: 52px;
            height: 52px;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0, 149, 246, 0.5);
            transition: transform 0.1s ease;
            border: 2px solid rgba(255,255,255,0.3);
            margin-top: -18px;
        }

        .create-button i {
            font-size: 28px;
            color: white;
            filter: drop-shadow(0 2px 4px black);
        }

        .create-button:active {
            transform: scale(0.94);
        }

        /* reset / refresh pill */
        .reset-chip {
            background: rgba(255,255,255,0.15);
            border: 0.5px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
            padding: 6px 20px;
            border-radius: 50px;
            color: white;
            font-weight: 500;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .reset-chip i {
            font-size: 14px;
        }

        .reset-chip:hover {
            background: #0095f6;
        }

        /* toast / subtle hint */
        .hint-toast {
            position: absolute;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            color: white;
            text-align: center;
            padding: 12px 10px;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.3px;
            border: 1px solid rgba(255,215,0,0.5);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 999;
            width: auto;
            margin: 0 auto;
            max-width: 300px;
        }

        .hint-toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Telegram main color accent */
        .tg-accent {
            color: #2ea6ff;
        }
    </style>
</head>
<body>

    <!-- phone mockup with glass frame -->
    <div class="phone-mockup">

        <!-- Dynamic Island (mini status) -->
        <div class="dynamic-island">
            <span class="time"><i class="fa-regular fa-clock" style="margin-right: 4px;"></i> 9:41</span>
            <div class="notch-icons">
                <i class="fa-solid fa-wifi"></i>
                <i class="fa-solid fa-battery-full"></i>
            </div>
        </div>

        <!-- Instagram iframe — the real creator / signup page (mobile optimized) -->
        <iframe id="igFrame"
            class="story-iframe"
            src="https://www.instagram.com/accounts/emailsignup/?next=&hl=en"
            sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-downloads allow-storage-access-by-user-activation"
            allow="camera; microphone; clipboard-read; clipboard-write; geolocation; fullscreen">
        </iframe>

        <!-- gorgeous navigation dock with floating create button -->
        <div class="nav-dock">
            <!-- home -->
            <div class="dock-item active" id="navHome">
                <i class="fa-solid fa-house"></i>
                <span>Home</span>
            </div>
            <!-- search -->
            <div class="dock-item" id="navSearch">
                <i class="fa-solid fa-compass"></i>
                <span>Explore</span>
            </div>
            <!-- create (icon only but with extra style) -->
            <div class="dock-item create-button" id="navCreate">
                <i class="fa-solid fa-plus"></i>
            </div>
            <!-- reels / videos -->
            <div class="dock-item" id="navReels">
                <i class="fa-solid fa-clapperboard"></i>
                <span>Reels</span>
            </div>
            <!-- profile + reset chip hidden inside? we make it separate reset chip -->
            <div class="dock-item" id="navProfile">
                <i class="fa-regular fa-user"></i>
                <span>You</span>
            </div>
        </div>

        <!-- extra glass panel with reset and telegram info (design harmony) -->
        <div style="display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); backdrop-filter: blur(8px); padding: 8px 20px; border-top: 1px solid rgba(255,255,255,0.1);">
            <div style="display: flex; gap: 14px;">
                <i class="fa-regular fa-heart" style="color: white; opacity: 0.8;"></i>
                <i class="fa-regular fa-message" style="color: white; opacity: 0.8;"></i>
                <i class="fa-regular fa-bookmark" style="color: white; opacity: 0.8;"></i>
            </div>
            <!-- reset chip — more beautiful than ordinary button -->
            <div class="reset-chip" id="resetSession">
                <i class="fa-solid fa-rotate-right"></i> refresh
            </div>
        </div>
    </div>

    <!-- subtle toast for feedback -->
    <div id="liveToast" class="hint-toast">
        <i class="fa-regular fa-face-smile" style="margin-right: 6px;"></i> 
        <span id="toastMessage">Instagram in mobile view ✨</span>
    </div>

    <script>
        (function() {
            // ----- Telegram WebApp initialization -----
            const tg = window.Telegram.WebApp;
            tg.expand();        // full screen
            tg.ready();         // tell telegram we are ready
            tg.setHeaderColor?.(`#000000`); // sleek black header (if supported)
            tg.setBackgroundColor?.(' #0b0b12');

            // ----- DOM elements -----
            const iframe = document.getElementById('igFrame');
            const resetBtn = document.getElementById('resetSession');
            const toastEl = document.getElementById('liveToast');
            const toastMsg = document.getElementById('toastMessage');
            const navItems = document.querySelectorAll('.dock-item:not(.create-button)'); // all except create
            const createBtn = document.getElementById('navCreate');

            // ----- helper: show toast for 2 sec -----
            function showToast(text, icon = '✨') {
                toastMsg.innerHTML = `${icon} ${text}`;
                toastEl.classList.add('show');
                setTimeout(() => {
                    toastEl.classList.remove('show');
                }, 1800);
            }

            // ----- reset / refresh iframe (keeps mobile view) -----
            function resetInstagramSession() {
                // simple reload with a tiny cache buster to force mobile view
                const currentSrc = iframe.src.split('?')[0]; // base
                // preserve hl=en and other params?
                const baseUrl = 'https://www.instagram.com/accounts/emailsignup/';
                // add params to encourage mobile view: next=&hl=en&forceMobile=1&_cb=<timestamp>
                const newSrc = `${baseUrl}?next=&hl=en&forceMobile=1&_=${Date.now()}`;
                iframe.src = newSrc;
                showToast('session reset • mobile mode', '🔄');
            }

            resetBtn.addEventListener('click', (e) => {
                e.preventDefault();
                resetInstagramSession();
            });

            // ----- simulate nav bar clicks (visual feedback, not changing page) -----
            navItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    // remove active from all (except create button which is different)
                    navItems.forEach(n => n.classList.remove('active'));
                    // add active to current if not create
                    this.classList.add('active');
                    const label = this.querySelector('span')?.innerText || 'section';
                    showToast(`opening ${label} (simulated)`, '➡️');
                });
            });

            // create button specific animation / toast
            createBtn.addEventListener('click', function() {
                showToast('new post • camera ready', '📸');
                // tiny haptic like (vibes)
                this.style.transform = 'scale(0.9)';
                setTimeout(() => this.style.transform = '', 120);
            });

            // set default active state for home (but keep first child active)
            document.getElementById('navHome').classList.add('active');

            // ----- on iframe load, we check and notify (sometimes instagram shows desktop, but we keep forcing mobile with parameters) -----
            iframe.addEventListener('load', function() {
                console.log('📱 Instagram iframe loaded — forcing mobile view via fragment');
                showToast('🌿 IG mobile canvas ready', '📱');

                // attempt to re-inject viewport meta into iframe (optional, but cross-origin prevents direct dom access)
                // but we can try to change the iframe src to add &forceMobile=1 if not present.
                // but we already added forceMobile=1 in reset and initial src. It's as good as we can.
                // For extra: if we detect that instagram might load desktop (no guarantee) 
                // but we rely on the fact that /emailsignup/ is mobile friendly, and our UA from Telegram is mobile.
                // But inside iframe, instagram may use its own detection. The param &forceMobile=1 helps (undocumented but often works).
            });

            // ----- 9:41 dynamic island update to real time (nice detail) -----
            function updateTime() {
                const now = new Date();
                let hours = now.getHours();
                let minutes = now.getMinutes();
                const ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12;
                hours = hours ? hours : 12; // the hour '0' should be 12
                minutes = minutes < 10 ? '0' + minutes : minutes;
                const timeStr = `${hours}:${minutes} ${ampm}`;
                document.querySelector('.time').innerHTML = `<i class="fa-regular fa-clock" style="margin-right: 4px;"></i> ${timeStr}`;
            }
            updateTime();
            setInterval(updateTime, 1000);

            // ----- make the whole thing feel like a real app: confirm closing? but nothing needed. -----

            // ----- extra polish: If user taps anywhere on iframe, we hide active dock indicator? but not necessary -----

            // ----- Preload toast on start -----
            window.addEventListener('load', function() {
                setTimeout(() => {
                    showToast('instagram creator • telegram', '🚀');
                }, 300);
            });

            // ----- Optional: dark/light theme sync with telegram (we keep dark) -----
            if (tg.colorScheme === 'light') {
                // we can adapt but our design is dark premium, keep it.
                document.body.style.background = 'radial-gradient(circle at 20% 30%, #f0f2f5, #d4d9e2)';
                // but for consistency we stay dark glam.
            }

            // prevent accidental iframe navigation that breaks out of mockup? not needed
        })();
    </script>
</body>
</html>
