<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IG Mobile Creator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* 1. Force a Phone-like aspect ratio on PC */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #000; /* Black background for PC margins */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 2. The Container that mimics a Phone Screen */
        .phone-wrapper {
            width: 100%;
            height: 100%;
            background: #fff;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* On PC (Screens wider than 600px), lock the width to a Phone size */
        @media (min-width: 600px) {
            .phone-wrapper {
                width: 390px; /* Standard iPhone/Android width */
                height: 844px; /* Standard Phone height */
                border: 12px solid #333; /* Simulated phone border */
                border-radius: 30px;
                box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            }
        }

        iframe {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            border: none;
        }

        .nav-bar {
            height: 50px;
            background: #fafafa;
            border-top: 1px solid #dbdbdb;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        button {
            background: #0095f6;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <iframe 
            id="igFrame"
            src="https://www.instagram.com/accounts/emailsignup/?next=&hl=en"
            allow="camera; microphone; clipboard-read; clipboard-write;">
        </iframe>

        <div class="nav-bar">
            <button onclick="location.reload()">Reset Session</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Optional: If Instagram detects PC, this script tries to force mobile viewport
        const iframe = document.getElementById('igFrame');
        iframe.onload = function() {
            console.log("Instagram Loaded in Phone View");
        };
    </script>
</body>
</html>
